# Runs frontend + backend vitest suites on every PR and on pushes to main.
# Kept intentionally lean — no jobs that need secrets, no lint/typecheck for
# now (we have no TS yet, ESLint is configured but not enforced in CI). When
# we add those gates, extend the matrix below.

name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  guards:
    name: Standing checks (SQL interpolation + route auth)
    runs-on: ubuntu-latest
    # Both scripts use only Node builtins (fs/path) — no install, no DB, fast.
    defaults:
      run:
        working-directory: ree-tracker-backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: SQL interpolation guard
        run: node scripts/audit-sql-interpolation.js

      - name: Route auth-coverage guard
        run: node scripts/audit-route-auth.js

  frontend:
    name: Frontend (vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ree-tracker
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ree-tracker/package-lock.json

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  backend:
    name: Backend (vitest)
    runs-on: ubuntu-latest
    # DATABASE_URL is a dummy — vitest doesn't connect, but Prisma's config
    # loader resolves env vars eagerly during `prisma generate` (which is
    # now fired automatically by package.json's `postinstall` + `pretest`
    # hooks), and would fail with PrismaConfigEnvError otherwise.
    env:
      DATABASE_URL: postgresql://localhost:5432/dummy
    defaults:
      run:
        working-directory: ree-tracker-backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ree-tracker-backend/package-lock.json

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

  lighthouse:
    name: Lighthouse CI (entry-path budgets)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ree-tracker
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ree-tracker/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      # Budgets: a11y >=0.95 hard-fails; LCP/CLS/TBT are warnings (CI is noisy).
      # Only the auth-gated entry/login path is reachable in CI (see lighthouserc.cjs).
      - name: Lighthouse CI
        run: npx --yes @lhci/cli@0.14.x autorun
